{% extends "base.html" %}

{% block title %}{{ page.frontmatter.title }}{% endblock %}
{% block description %}{{ page.frontmatter.description.as_deref().unwrap_or("") }}{% endblock %}

{% block content %}
<article class="page-content">
    <header class="page-header">
        <h1 class="page-title">{{ page.frontmatter.title }}</h1>
    </header>
    
    <div class="markdown-body">
        {{ page.html | safe }}
    </div>
    
    <nav class="page-nav">
        <a href="/">&larr; Back to home</a>
    </nav>
</article>
{% endblock %}
