<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block description %}Matrix Blog - A Rust-powered blog{% endblock %}">
    <title>{% block title %}Matrix Blog{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/main.js" defer></script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    
    <header class="site-header">
        <nav class="site-nav">
            <a href="/" class="site-logo">Matrix</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
            </ul>
        </nav>
    </header>
    
    <main id="main-content" class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="site-footer">
        <p>&copy; 2026 Matrix Blog. Built with Rust.</p>
    </footer>
</body>
</html>
